name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Publish
        run: |
          # setup-node writes _authToken=${NODE_AUTH_TOKEN} using GITHUB_TOKEN,
          # which npmjs.com rejects. Remove it so npm uses its own OIDC exchange.
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          npm publish --provenance --access public
